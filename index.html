<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infografía de Pago · LexSuite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&family=Bebas+Neue&family=Montserrat:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ui-bg:#0b0f1a;
  --ui-surface:rgba(255,255,255,0.04);
  --ui-border:rgba(255,255,255,0.08);
  --ui-text:#e2e8f0;
  --ui-muted:#64748b;
  --ui-accent:#7c6af7;
}
body{font-family:'DM Sans',sans-serif;background:var(--ui-bg);min-height:100vh;color:var(--ui-text);}

/* ═══════════════════════════════════════════════
   LAYOUT PRINCIPAL
═══════════════════════════════════════════════ */
.app-wrap{display:grid;grid-template-columns:400px 1fr;min-height:100vh;}

/* ── PANEL IZQUIERDO (editor) ── */
.panel-editor{background:#0d1220;border-right:1px solid var(--ui-border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--ui-border);}
.panel-header h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.panel-header p{font-size:0.72rem;color:var(--ui-muted);margin-top:2px;}
.panel-scroll{flex:1;overflow-y:auto;padding:20px 24px;}
.panel-scroll::-webkit-scrollbar{width:3px;}
.panel-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

/* Selector de empresa */
.empresa-tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:20px;flex-wrap:wrap;}
.empresa-tab{flex:1;min-width:80px;padding:8px 6px;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.68rem;font-weight:600;cursor:pointer;background:transparent;color:var(--ui-muted);transition:all .2s;text-align:center;}
.empresa-tab.active-egida{background:#1a1308;color:#c9a84c;}
.empresa-tab.active-finacorp{background:#0a1628;color:#4a9eff;}
.empresa-tab.active-labase{background:#1a0a00;color:#f5a800;}
.empresa-tab.active-info{background:#0a1f1c;color:#2dd4bf;}

/* Secciones del editor */
.editor-section{margin-bottom:20px;}
.editor-section-title{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ui-muted);margin-bottom:10px;}
.field-group{margin-bottom:10px;}
.field-group label{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#475569;display:block;margin-bottom:5px;}
.field-group input,.field-group textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--ui-border);border-radius:8px;color:var(--ui-text);font-family:'DM Sans',sans-serif;font-size:0.78rem;transition:border-color .2s;}
.field-group input:focus,.field-group textarea:focus{outline:none;border-color:var(--ui-accent);}
.field-group textarea{resize:vertical;min-height:44px;}

/* Cuenta card en editor */
.cuenta-edit-card{background:rgba(255,255,255,0.03);border:1px solid var(--ui-border);border-radius:10px;padding:12px;margin-bottom:8px;position:relative;}
.btn-del-cuenta{position:absolute;top:8px;right:8px;width:22px;height:22px;background:rgba(239,68,68,0.15);border:none;border-radius:50%;color:#f87171;font-size:0.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-del-cuenta:hover{background:rgba(239,68,68,0.3);}
.btn-add-cuenta{width:100%;padding:9px;background:rgba(124,106,247,0.1);border:1px dashed rgba(124,106,247,0.3);border-radius:8px;color:#a78bfa;font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:600;cursor:pointer;margin-top:4px;}
.btn-add-cuenta:hover{background:rgba(124,106,247,0.2);}

/* Bancos personalizados */
.banco-upload-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.banco-upload-row input[type=text]{flex:1;min-width:120px;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--ui-border);border-radius:8px;color:var(--ui-text);font-family:'DM Sans',sans-serif;font-size:0.75rem;}
.banco-upload-label{display:flex;align-items:center;gap:5px;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px dashed var(--ui-border);border-radius:8px;color:var(--ui-muted);font-size:0.72rem;cursor:pointer;}
.banco-upload-label input{display:none;}
.btn-add-banco{padding:8px 14px;background:rgba(124,106,247,0.15);border:1px solid rgba(124,106,247,0.3);border-radius:8px;color:#a78bfa;font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.bancos-chips{display:flex;flex-wrap:wrap;gap:6px;}
.banco-chip{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 6px;background:rgba(255,255,255,0.05);border:1px solid var(--ui-border);border-radius:20px;font-size:0.68rem;color:var(--ui-text);}
.banco-chip img{width:18px;height:18px;object-fit:contain;border-radius:3px;}
.chip-del{background:none;border:none;color:var(--ui-muted);cursor:pointer;font-size:0.6rem;margin-left:2px;}

/* ── PANEL DERECHO (preview) ── */
.panel-preview{padding:32px;display:flex;flex-direction:column;gap:24px;background:#080c14;}
.preview-toolbar{display:flex;align-items:center;justify-content:space-between;}
.preview-toolbar h2{font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;color:var(--ui-muted);text-transform:uppercase;letter-spacing:2px;}
.btn-download{display:flex;align-items:center;gap:8px;padding:11px 24px;background:linear-gradient(135deg,#7c6af7,#5b4fcf);border:none;border-radius:30px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(124,106,247,0.35);transition:all .2s;}
.btn-download:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,106,247,0.45);}
.btn-download:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.preview-canvas{display:flex;justify-content:center;}

/* Selector de banco en lista */
input[list]{appearance:none;}

/* ═══════════════════════════════════════════════
   ████  ÉGIDA JURÍDICA  ████
   Nuevo diseño: membrete legal premium
   Barra dorada top · Header centrado · Tarjetas limpias
═══════════════════════════════════════════════ */
.inf-egida{
  width:680px;
  font-family:'Cormorant Garamond','Georgia',serif;
  background:#0e0d0b;
  color:#e8dfc8;
  position:relative;
  overflow:hidden;
}

/* Textura de fondo sutil */
.eg-bg{position:absolute;inset:0;pointer-events:none;}
.eg-bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 50% at 50% 0%,rgba(201,168,76,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 80% 60% at 0% 100%,rgba(201,168,76,0.04) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at 100% 100%,rgba(201,168,76,0.04) 0%,transparent 55%);
}
/* Patrón diagonal muy sutil */
.eg-bg::after{
  content:'';position:absolute;inset:0;opacity:0.03;
  background:repeating-linear-gradient(
    45deg,
    rgba(201,168,76,0.8),rgba(201,168,76,0.8) 1px,
    transparent 1px,transparent 28px
  );
}

/* Barra dorada superior */
.eg-topbar{
  height:4px;
  background:linear-gradient(90deg,transparent 0%,#8a6820 10%,#c9a84c 30%,#e8cc7a 50%,#c9a84c 70%,#8a6820 90%,transparent 100%);
  position:relative;z-index:3;
}

/* Header: logo centrado arriba + título */
.eg-header{
  padding:28px 32px 22px;
  position:relative;z-index:2;
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid rgba(201,168,76,0.18);
}
/* Bloque logo izquierda */
.eg-logo-wrap{
  flex-shrink:0;
  width:150px;
  display:flex;align-items:center;justify-content:center;
  padding-right:24px;
  border-right:1px solid rgba(201,168,76,0.2);
}
.eg-logo-img{width:130px;height:auto;display:block;}
/* Bloque títulos derecha */
.eg-header-titles{
  flex:1;
  padding-left:28px;
  display:flex;flex-direction:column;justify-content:center;
}
.eg-pretitle{
  font-family:'DM Sans',sans-serif;
  font-size:0.52rem;font-weight:700;letter-spacing:5px;
  color:#c9a84c;text-transform:uppercase;opacity:0.65;
  margin-bottom:6px;
}
.eg-main-title{
  font-size:2.6rem;font-weight:600;
  color:#e8dfc8;
  line-height:0.95;
  letter-spacing:-0.5px;
  font-family:'Cormorant Garamond',serif;
}
.eg-main-title span{
  color:#c9a84c;
  font-style:italic;
}
.eg-divider{
  display:flex;align-items:center;gap:12px;margin-top:14px;
}
.eg-divider-line{
  flex:1;height:1px;
  background:linear-gradient(90deg,#c9a84c,transparent);
  opacity:0.4;
}
.eg-divider-text{
  font-family:'DM Sans',sans-serif;
  font-size:0.5rem;font-weight:700;letter-spacing:4px;
  color:#c9a84c;text-transform:uppercase;opacity:0.5;
  flex-shrink:0;
}
.eg-divider-line.right{
  background:linear-gradient(270deg,#c9a84c,transparent);
}

/* Título del recuadro de cuenta — banda dorada con decoración centrada */
.eg-cuenta-titulo{
  font-family:'DM Sans',sans-serif;
  font-size:0.68rem;font-weight:800;letter-spacing:2.5px;
  color:#f0dc9a;text-transform:uppercase;
  margin-bottom:10px;
  padding:9px 16px;
  background:rgba(201,168,76,0.18);
  border-bottom:1px solid rgba(201,168,76,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  text-align:center;
  box-sizing:border-box;
}
.eg-cuenta-titulo::before,
.eg-cuenta-titulo::after{
  content:'';
  flex:1;
  min-width:12px;
  height:1px;
  background:rgba(201,168,76,0.5);
}

/* Layout de tarjetas Égida: filas con tarjetas de ancho completo o medio */
.eg-cuentas-grid{
  display:flex;
  flex-direction:row;
  flex-wrap:wrap;
  gap:10px;
}
/* Tarjeta de fila completa: ocupa todo el ancho */
.eg-cuenta.full-row{
  flex:0 0 100%;
}
/* Tarjeta de media fila: dos comparten una fila */
.eg-cuenta.half-row{
  flex:1 1 calc(50% - 5px);
  min-width:0;
}
/* Ajustes de las tarjetas de media fila (más compactas) */
.eg-cuenta.half-row .eg-cuenta-fila{
  gap:12px;
}
.eg-cuenta.half-row .eg-bank-circle{
  width:52px;height:52px;flex-shrink:0;
}
.eg-cuenta.half-row .eg-bank-circle img{
  width:44px;height:44px;
}
.eg-cuenta.half-row .eg-cuenta-row{
  grid-template-columns:1fr;
  gap:6px 0;
}
.eg-cuenta.half-row .eg-field{
  grid-column:1/-1;
}
.eg-cuenta.half-row .eg-field-val{
  font-size:0.92rem;
  white-space:normal;
  word-break:break-all;
  overflow:visible;
  text-overflow:unset;
  line-height:1.35;
}
.eg-cuenta.half-row .eg-field-label{
  font-size:0.6rem;
}
.eg-cuenta.half-row .eg-cuenta-banco{
  font-size:0.68rem;
  margin-bottom:6px;
}
.eg-cuenta.half-row .eg-cuenta-titulo{
  font-size:0.62rem;
  padding:7px 10px;
  margin-bottom:8px;
  gap:6px;
}

/* Body Égida */
.eg-body{padding:20px 28px 22px;position:relative;z-index:2;}
/* Tarjeta cuenta — estilo documento legal */
.eg-cuenta{
  display:flex;flex-direction:column;align-items:stretch;gap:12px;
  padding:14px 18px;
  background:#2a2416;
  border:1px solid rgba(201,168,76,0.3);
  border-left:3px solid #c9a84c;
  position:relative;
}
/* Fila interna: círculo de banco + datos */
.eg-cuenta-fila{
  display:flex;align-items:center;gap:18px;
}
/* Línea izquierda dorada */
.eg-cuenta::before{
  content:'';
  position:absolute;left:0;top:8px;bottom:8px;width:2px;
  background:linear-gradient(180deg,transparent,#c9a84c,transparent);
}
/* Número de orden */
.eg-cuenta-num{
  position:absolute;top:10px;right:14px;
  font-family:'DM Sans',sans-serif;
  font-size:0.5rem;font-weight:700;letter-spacing:2px;
  color:rgba(201,168,76,0.25);
  text-transform:uppercase;
}
/* Círculo banco */
.eg-bank-circle{
  flex-shrink:0;
  width:68px;height:68px;border-radius:14px;
  background:#1a150d;
  border:1.5px solid rgba(201,168,76,0.45);
  box-shadow:0 0 0 3px rgba(201,168,76,0.06),0 0 16px rgba(201,168,76,0.12);
  display:flex;align-items:center;justify-content:center;
}
.eg-bank-circle img{width:60px;height:60px;object-fit:contain;border-radius:10px;}
.eg-cuenta-data{flex:1;min-width:0;}
.eg-cuenta-banco{
  font-family:'DM Sans',sans-serif;
  font-size:0.65rem;font-weight:700;letter-spacing:3px;
  color:#c9a84c;text-transform:uppercase;margin-bottom:10px;
}
/* Campos en 2 columnas dentro de cada tarjeta */
.eg-cuenta-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 20px;
}
.eg-field{display:flex;flex-direction:column;gap:2px;}
.eg-field.full{grid-column:1/-1;}
.eg-field-label{
  font-family:'DM Sans',sans-serif;
  font-size:0.52rem;font-weight:700;letter-spacing:1.5px;
  color:rgba(201,168,76,0.55);text-transform:uppercase;
}
.eg-field-val{
  font-size:0.92rem;font-weight:500;
  color:#f5ecd5;letter-spacing:0.2px;
  font-family:'DM Sans',sans-serif;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.eg-obs{
  font-family:'DM Sans',sans-serif;
  font-size:0.63rem;font-style:italic;
  color:#c9a84c;opacity:0.7;margin-top:8px;
  padding-left:8px;border-left:1px solid rgba(201,168,76,0.3);
  grid-column:1/-1;
}

/* Barra dorada inferior antes del footer */
.eg-bottombar{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);
  margin:0 28px;
  position:relative;z-index:2;
}

/* Footer Égida */
.eg-footer{
  background:#080706;
  border-top:1px solid rgba(201,168,76,0.15);
  padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:2;
}
.eg-footer-brand{
  font-family:'DM Sans',sans-serif;
  font-size:0.55rem;font-weight:700;letter-spacing:2.5px;
  color:rgba(201,168,76,0.35);text-transform:uppercase;
}
.eg-footer-sello{
  display:flex;align-items:center;gap:8px;
  padding:4px 14px;border:1px solid rgba(201,168,76,0.2);
  font-family:'DM Sans',sans-serif;
  font-size:0.5rem;font-weight:700;letter-spacing:4px;
  color:rgba(201,168,76,0.3);text-transform:uppercase;
}

/* ── Toggle activar/desactivar tarjeta (editor) ── */
.cuenta-toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;margin-bottom:10px;
  background:rgba(201,168,76,0.07);
  border:1px solid rgba(201,168,76,0.18);
  border-radius:8px;
}
.cuenta-toggle-row span{
  font-size:0.66rem;font-weight:700;letter-spacing:0.5px;
  color:#c9a84c;text-transform:uppercase;
}
.toggle-switch{
  position:relative;width:42px;height:22px;flex-shrink:0;cursor:pointer;
}
.toggle-switch input{display:none;}
.toggle-track{
  position:absolute;inset:0;border-radius:22px;
  background:rgba(255,255,255,0.12);transition:background .2s;
}
.toggle-thumb{
  position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
  background:#94a3b8;transition:transform .2s,background .2s;
}
.toggle-switch input:checked + .toggle-track{background:rgba(34,197,94,0.5);}
.toggle-switch input:checked + .toggle-track .toggle-thumb{
  transform:translateX(20px);background:#22c55e;
}
/* Tarjeta del editor cuando está desactivada */
.cuenta-edit-card.inactiva{
  opacity:0.5;
}
.cuenta-edit-card.inactiva::after{
  content:'OCULTA EN VISTA PREVIA';
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  font-size:0.5rem;font-weight:700;letter-spacing:1px;
  color:#f87171;
}

/* ═══════════════════════════════════════════════
   ████  FINACORP  ████
   Estética: Azul marino · Blanco · Líneas limpias
   Inspiración: Holding corporativo premium
═══════════════════════════════════════════════ */
.inf-finacorp{
  width:680px;
  font-family:'Montserrat',sans-serif;
  background:#05101f;
  color:#fff;
  position:relative;overflow:hidden;
}

.fn-bg{position:absolute;inset:0;pointer-events:none;}
.fn-bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 50% -10%,rgba(30,80,180,0.25) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 100% 100%,rgba(10,40,100,0.3) 0%,transparent 60%);
}
/* Líneas diagonales sutiles */
.fn-bg::after{
  content:'';position:absolute;inset:0;opacity:0.04;
  background:repeating-linear-gradient(
    -55deg,
    transparent,transparent 30px,
    rgba(100,160,255,0.8) 30px,rgba(100,160,255,0.8) 31px
  );
}

/* Barra superior azul */
.fn-topbar{
  height:5px;
  background:linear-gradient(90deg,#1e50b4,#4a9eff,#1e50b4);
  position:relative;z-index:2;
}

/* Header Finacorp */
.fn-header{
  padding:24px 32px;
  display:flex;align-items:center;gap:24px;
  position:relative;z-index:2;
  border-bottom:1px solid rgba(74,158,255,0.12);
}
.fn-logo-area{
  flex-shrink:0;display:flex;align-items:center;
  background:#ffffff;
  border-radius:6px;
  padding:6px 10px;
  box-shadow:0 0 0 1px rgba(74,158,255,0.15), 0 4px 18px rgba(0,0,0,0.35);
}
.fn-logo-img{width:200px;height:auto;display:block;}
/* Separador vertical */
.fn-header-sep{
  width:1px;height:60px;
  background:linear-gradient(180deg,transparent,rgba(74,158,255,0.3),transparent);
  flex-shrink:0;
}
.fn-header-right{flex:1;padding-left:4px;}
.fn-pretitle{
  font-size:0.55rem;font-weight:700;letter-spacing:4px;
  color:#4a9eff;text-transform:uppercase;margin-bottom:6px;opacity:0.7;
}
.fn-main-title{
  font-size:2rem;font-weight:900;
  color:#fff;letter-spacing:-0.5px;line-height:1.05;
  text-transform:uppercase;
}
.fn-main-title span{color:#4a9eff;}

/* Tarjeta de cuenta Finacorp */
.fn-body{padding:20px 32px;position:relative;z-index:2;}
.fn-cuentas-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.fn-cuenta-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(74,158,255,0.12);
  border-left:3px solid #1e50b4;
  padding:14px 16px;
  display:flex;gap:12px;
  align-items:flex-start;
}
.fn-cuenta-info{flex:1;min-width:0;}
.fn-cuenta-banco{
  font-size:0.58rem;font-weight:700;letter-spacing:3px;
  color:#4a9eff;text-transform:uppercase;margin-bottom:10px;
}
.fn-fields{display:flex;flex-direction:column;gap:8px;}
.fn-field{}
.fn-field-label{
  font-size:0.5rem;font-weight:700;letter-spacing:2px;
  color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:2px;
}
.fn-field-val{
  font-size:0.82rem;font-weight:600;
  color:#e8f0ff;letter-spacing:0.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fn-field-full{grid-column:1/-1;}
.fn-obs{
  font-size:0.62rem;color:#4a9eff;opacity:0.7;
  margin-top:6px;font-style:italic;
}
.fn-bank-logo{
  width:64px;height:64px;flex-shrink:0;

  return `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='12' fill='${encodeURIComponent(color)}'/%3E%3Ctext x='50' y='56' font-size='${text.length>3?'22':'28'}' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='Arial Black,Arial' font-weight='900'%3E${text}%3C/text%3E%3C/svg%3E`;
}

function getBankLogo(nombre){
  if(!nombre) return svgIcon('#334155','?');
  const k = nombre.toLowerCase().replace(/\s+/g,'');

  // Solo usar logos de Bancos Personalizados
  const custom = bancosCustom.find(b =>
    b.key === k ||
    b.nombre.toLowerCase() === nombre.toLowerCase() ||
    k.includes(b.key) ||
    b.key.includes(k)
  );
  if(custom) return custom.logo;

  // Fallback neutro: inicial del banco en gris
  const initial = nombre.charAt(0).toUpperCase();
  return svgIcon('#475569', initial);
}

/* ── Logo de marca (para Información Empresarial) — agregado ── */
function getMarcaLogo(nombre){
  if(!nombre) return svgIcon('#334155','?');
  const k = nombre.toLowerCase().replace(/\s+/g,'');
  if(k.includes('base'))     return LOGOS_EMPRESA.labase;
  if(k.includes('finacorp')) return LOGOS_EMPRESA.finacorp;

    b.key === k ||
    b.nombre.toLowerCase() === nombre.toLowerCase() ||
    k.includes(b.key) ||
    b.key.includes(k)
  );

/* ── GAS helpers ── */

// ⚙️ CONFIGURACIÓN PARA VERCEL:

// (la obtienes en Apps Script → Implementar → Nueva implementación → Web App)
const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw28ITTnTVwW_t7UpLkIHeAAxcPTdC_aAM1N0HNXO8yWd-SSg9w64SaQX6U_r7yh244/exec';

// Detecta si estamos dentro de Apps Script o en Vercel/externo
const _enAppsScript = (typeof google !== 'undefined' && google.script && google.script.run);

function gasCall(payload){
  if (_enAppsScript) {
    // ── Modo Apps Script: comunicación directa sin red ──
    return new Promise((resolve)=>{
      const action = payload.action;
      const runner = google.script.run
        .withSuccessHandler(res => resolve(res || {ok:false}))
        .withFailureHandler(err => {
          console.error('GAS error en', action, ':', err);
          resolve({ok:false, error:err?.message||String(err)});

        case 'saveLogos':           runner.accionSaveLogos(payload); break;
        case 'guardarPlantilla':    runner.guardarPlantilla(payload); break;
        case 'eliminarLogoBanco':   runner.eliminarLogoBanco(payload.key); break;
        case 'guardarEstado':       runner.guardarEstadoEmpresas(payload); break;
        case 'cargarEstado':        runner.cargarEstadoEmpresas(); break;
        default: resolve({ok:false, error:'Acción desconocida: '+action});
      }
    });
  } else {
    // ── Modo Vercel / navegador externo: fetch HTTP al Web App ──
    const action = payload.action;
    // Mapa de action → función en el servidor
    const mapaFunciones = {
      'getLogos':         { funcion: 'accionGetLogos',        datos: {} },
      'saveLogos':        { funcion: 'accionSaveLogos',       datos: payload },
      'guardarPlantilla': { funcion: 'guardarPlantilla',      datos: payload },
      'eliminarLogoBanco':{ funcion: 'eliminarLogoBanco',     datos: { key: payload.key } },
      'guardarEstado':    { funcion: 'guardarEstadoEmpresas', datos: payload },
      'cargarEstado':     { funcion: 'cargarEstadoEmpresas',  datos: {} },
    };
    const mapa = mapaFunciones[action];
    if (!mapa) return Promise.resolve({ok:false, error:'Acción desconocida: '+action});

    // ── POST con el cuerpo (NO GET) ──
    // Los logos van en base64 (~80 KB). Si se mandan en la URL (GET) Google
    // responde 413 "Content Too Large" y el logo nunca se guarda en Drive.
    // Enviándolos en el body del POST no hay límite de longitud de URL.
    // Content-Type 'text/plain' = petición "simple" → NO dispara preflight CORS
    // (Apps Script no responde a las peticiones OPTIONS de preflight).
    return fetch(GAS_WEBAPP_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        funcion: mapa.funcion,
        datos:   mapa.datos
      })
    })
    .then(r => r.json())
    .catch(err => {
      console.error('Fetch GAS error en', action, ':', err);
      return { ok: false, error: err.message || String(err) };
    });
  }
}

  const d = await gasCall({action:'getLogos'});
  bancosCustom = (d && d.bancos) ? d.bancos : [];
}

// ── Persistencia global del estado de empresas ──
// Variable para evitar guardar mientras se está cargando
let _isLoadingEstado = false;
let _saveTimer = null;
let _ultimoEstadoGuardado = null;
// Bandera: hay cambios locales aún NO confirmados por el servidor.
// Mientras sea true, la sincronización NO sobrescribe el estado local
// (esto evita que una tarjeta recién agregada/eliminada "reaparezca").
let _hayCambiosPendientes = false;

// Compara dos estados para saber si hubo cambios
function estadoIgual(a, b) {
  return JSON.stringify(a) === JSON.stringify(b);
}

// Envía el estado al servidor de inmediato (sin debounce)
async function enviarEstadoAhora(){
  if (_isLoadingEstado) return;
  const estadoActual = JSON.parse(JSON.stringify(empresasState));
  if (estadoIgual(estadoActual, _ultimoEstadoGuardado)) {
    _hayCambiosPendientes = false;
    return;
  }
  const r = await gasCall({action:'guardarEstado', estado: estadoActual});
  if (r && r.ok) {
    _ultimoEstadoGuardado = estadoActual;
    _hayCambiosPendientes = false;
    mostrarIndicadorGuardado();
  }
  // Si falló, _hayCambiosPendientes sigue true: se reintentará al próximo cambio.
}

// Guarda el estado actual.
//  - guardarEstadoGlobal()      → con debounce de 1.2s (para escritura en inputs)
//  - guardarEstadoGlobal(true)  → inmediato (para agregar/eliminar/activar tarjetas)
function guardarEstadoGlobal(inmediato){
  if (_isLoadingEstado) return; // No guardar si estamos cargando del servidor
  _hayCambiosPendientes = true; // Bloquea la sincronización hasta confirmar
  clearTimeout(_saveTimer);
  if (inmediato === true) {
    enviarEstadoAhora();
    return;
  }
  _saveTimer = setTimeout(enviarEstadoAhora, 1200);
}

// Carga el estado desde el servidor
async function cargarEstadoGlobal(){
  _isLoadingEstado = true;
  try {
    const r = await gasCall({action:'cargarEstado'});
    if (r && r.ok && r.estado) {
      // Validar estructura mínima antes de aplicar
      if (r.estado.egida && r.estado.finacorp && r.estado.labase) {
        Object.assign(empresasState, r.estado);
        // Compatibilidad con estados guardados antes de agregar "info" (agregado)
        if(!empresasState.info || !empresasState.info.grupos){
          empresasState.info = { grupos: [] };
        }
        _ultimoEstadoGuardado = JSON.parse(JSON.stringify(empresasState));
      }
    }
  } catch(e) {
    console.warn('No se pudo cargar estado:', e);
  } finally {
    _isLoadingEstado = false;
  }
}

// Sincroniza cambios de otros usuarios (cada 15 segundos)
async function sincronizarConServidor(){
  if (_isLoadingEstado) return;
  // No sincronizar si tenemos cambios locales sin confirmar:
  // sobrescribir ahora haría "reaparecer" tarjetas eliminadas o borrar las nuevas.
  if (_hayCambiosPendientes) return;
  // No sincronizar si el usuario está editando un input ahora mismo
  const activo = document.activeElement;
  if (activo && (activo.tagName === 'INPUT' || activo.tagName === 'TEXTAREA')) return;

  try {
    const r = await gasCall({action:'cargarEstado'});
    // Re-verificar: si mientras esperábamos la respuesta el usuario hizo un
    // cambio, descartamos lo recibido para no pisar su trabajo.
    if (_hayCambiosPendientes) return;
    if (r && r.ok && r.estado) {
      const estadoServidor = JSON.stringify(r.estado);
      const estadoLocal    = JSON.stringify(empresasState);
      if (estadoServidor !== estadoLocal && r.estado.egida && r.estado.finacorp && r.estado.labase) {
        _isLoadingEstado = true;
        Object.assign(empresasState, r.estado);
        // Compatibilidad con estados guardados antes de agregar "info" (agregado)
        if(!empresasState.info || !empresasState.info.grupos){
          empresasState.info = { grupos: [] };
        }
        _ultimoEstadoGuardado = JSON.parse(JSON.stringify(empresasState));
        renderEditor();
        renderInfografia();
        mostrarIndicadorSincronizado();
        _isLoadingEstado = false;
      }
    }
    // También sincronizar logos
    const rL = await gasCall({action:'getLogos'});
    if (rL && rL.bancos) {
      const idsServidor = rL.bancos.map(b => b.fileId).sort().join(',');
      const idsLocal    = bancosCustom.map(b => b.fileId).sort().join(',');
      if (idsServidor !== idsLocal) {
        bancosCustom = rL.bancos;
        renderBancosChips();
        renderInfografia();
      }
    }
  } catch(e) {}
}

/* ── Eliminar fondo blanco ── */
function removeWhiteBg(imgEl,tol=45){
  return new Promise(resolve=>{
    const c=document.createElement('canvas');
    c.width=imgEl.naturalWidth||imgEl.width||80;
    c.height=imgEl.naturalHeight||imgEl.height||80;
    const ctx=c.getContext('2d');
    ctx.drawImage(imgEl,0,0,c.width,c.height);
    const id=ctx.getImageData(0,0,c.width,c.height);
    const d=id.data;
    for(let i=0;i<d.length;i+=4){
      if(d[i]>255-tol&&d[i+1]>255-tol&&d[i+2]>255-tol) d[i+3]=0;
    }
    ctx.putImageData(id,0,0);
    resolve(c.toDataURL('image/png'));
  });
}

        <p style="font-size:0.55rem;color:#475569;margin-top:4px;">"Media fila": dos tarjetas seguidas se ponen lado a lado en la misma fila</p>
      </div>` : '';

    // Campo título solo para Égida, va al inicio
    const egidaTitulo = empresaActual === 'egida' ? `
      <div class="field-group">
        <label>Título del recuadro <span style="color:#475569;font-weight:400;text-transform:none;font-size:0.58rem">(opcional)</span></label>
        <input type="text" data-field="titulo" data-i="${i}" value="${escHtml(c.titulo||'')}" placeholder="Ej: Predio, Instancias, etc.">
      </div>` : '';

    // Toggle activar/desactivar solo para Égida
    const activa = c.activo !== false;
    const egidaToggle = empresaActual === 'egida' ? `
      <div class="cuenta-toggle-row">
        <span>${activa ? 'Tarjeta activa' : 'Tarjeta inactiva'}</span>
        <label class="toggle-switch">
          <input type="checkbox" class="chk-activo" data-i="${i}" ${activa?'checked':''}>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>` : '';

    const claseInactiva = (empresaActual === 'egida' && !activa) ? ' inactiva' : '';

    return `
    <div class="cuenta-edit-card${claseInactiva}">
      <button class="btn-del-cuenta" data-i="${i}">✕</button>
      ${egidaToggle}
      ${egidaTitulo}
      <div class="field-group">
        <label>Banco</label>
        <input type="text" list="bancosSugeridos" data-field="banco" data-i="${i}" value="${escHtml(c.banco)}" placeholder="Ej: BCP">
      </div>
      <div class="field-group">
        <label>Titular</label>
        <input type="text" data-field="titular" data-i="${i}" value="${escHtml(c.titular)}">
      </div>
      <div class="field-group">
        <label>N° Cuenta</label>
        <input type="text" data-field="numero" data-i="${i}" value="${escHtml(c.numero)}">
      </div>
      <div class="field-group">
        <label>CCI</label>
        <input type="text" data-field="cci" data-i="${i}" value="${escHtml(c.cci)}">
      </div>
      <div class="field-group">
        <label>Observación</label>
        <textarea data-field="observacion" data-i="${i}">${escHtml(c.observacion)}</textarea>
      </div>
      ${egidaExtras}
    </div>`;
  }).join('');

  container.querySelectorAll('input,textarea').forEach(el=>{
    el.addEventListener('input',e=>{
      empresasState[empresaActual].cuentas[+e.target.dataset.i][e.target.dataset.field]=e.target.value;
      guardarEstadoGlobal();
      renderInfografia();
    });
  });
  container.querySelectorAll('.btn-del-cuenta').forEach(btn=>{
    btn.addEventListener('click',()=>{
      empresasState[empresaActual].cuentas.splice(+btn.dataset.i,1);
      guardarEstadoGlobal(true);
      renderEditor();renderInfografia();
    });
  });
  // Toggle activar/desactivar tarjeta (solo Égida)
  container.querySelectorAll('.chk-activo').forEach(chk=>{
    chk.addEventListener('change',()=>{
      const i = +chk.dataset.i;
      empresasState[empresaActual].cuentas[i].activo = chk.checked;
      guardarEstadoGlobal(true);
      renderEditor();
      renderInfografia();
    });
  });
  // Botones de columna (solo Égida)
  container.querySelectorAll('.btn-columna').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i = +btn.dataset.i;
      const col = +btn.dataset.col;
      empresasState[empresaActual].cuentas[i].columna = col;
      guardarEstadoGlobal(true);
      renderEditor();
      renderInfografia();
    });
  });
}

        <label>Marcas asociadas <span style="color:#475569;font-weight:400;text-transform:none;font-size:0.58rem">(separadas por coma)</span></label>
        <input type="text" data-field="marcas" data-i="${i}" value="${escHtml((g.marcas||[]).join(', '))}" placeholder="Ej: Finacorp, Arxatec">
      </div>
      <div class="field-group">
        <label>Razón Social</label>
        <input type="text" data-field="razonSocial" data-i="${i}" value="${escHtml(g.razonSocial)}">
      </div>
      <div class="field-group">
        <label>N° de RUC</label>
        <input type="text" data-field="ruc" data-i="${i}" value="${escHtml(g.ruc)}">
      </div>
      <div class="field-group">
        <label>Domicilio Fiscal</label>
        <textarea data-field="domicilioFiscal" data-i="${i}">${escHtml(g.domicilioFiscal)}</textarea>
      </div>
      <div class="field-group">

        <input type="text" data-field="representanteLegal" data-i="${i}" value="${escHtml(g.representanteLegal)}">
      </div>
      <div class="field-group">

        <input type="text" data-field="dniRepresentante" data-i="${i}" value="${escHtml(g.dniRepresentante)}">

  container.querySelectorAll('input,textarea').forEach(el=>{

/* ── Bancos custom ── */
document.getElementById('bancoLogoInput').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const original=new window.Image();
    original.onload=()=>{
      // 1. Dibujar la imagen original en un canvas
      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width  = original.width;
      tmpCanvas.height = original.height;
      const tmpCtx = tmpCanvas.getContext('2d');
      tmpCtx.drawImage(original, 0, 0);

      // 2. Detectar bordes del contenido visible (recortar transparente/blanco)
      let minX = original.width, minY = original.height, maxX = 0, maxY = 0;
      try {
        const imgData = tmpCtx.getImageData(0, 0, original.width, original.height);
        const d = imgData.data;
        for (let y = 0; y < original.height; y++) {
          for (let x = 0; x < original.width; x++) {
            const idx = (y * original.width + x) * 4;
            const a = d[idx + 3];
            const r2 = d[idx], g = d[idx + 1], b = d[idx + 2];
            // Pixel "visible" = alpha > 10 Y no es blanco puro
            const esBlanco = (r2 > 245 && g > 245 && b > 245);
            if (a > 10 && !esBlanco) {
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
              if (y < minY) minY = y;
              if (y > maxY) maxY = y;
            }
          }
        }
      } catch(err) {
        // Si falla (CORS u otro), usar imagen completa sin recortar
        minX = 0; minY = 0; maxX = original.width - 1; maxY = original.height - 1;
      }

      // Si no encontró nada visible, usar la imagen completa
      if (minX >= maxX || minY >= maxY) {
        minX = 0; minY = 0; maxX = original.width - 1; maxY = original.height - 1;
      }

      // Padding pequeño alrededor del contenido
      const pad = 4;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(original.width - 1, maxX + pad);
      maxY = Math.min(original.height - 1, maxY + pad);

      const cropW = maxX - minX + 1;
      const cropH = maxY - minY + 1;

      // 3. Escalar a un tamaño máximo manteniendo proporciones
      const MAX = 256;
      let finalW = cropW;
      let finalH = cropH;
      if (finalW > MAX || finalH > MAX) {
        const scale = MAX / Math.max(finalW, finalH);
        finalW = Math.round(finalW * scale);
        finalH = Math.round(finalH * scale);
      }

      // 4. Dibujar recortado y escalado
      const c = document.createElement('canvas');
      c.width = finalW;
      c.height = finalH;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.clearRect(0, 0, finalW, finalH);
      ctx.drawImage(tmpCanvas, minX, minY, cropW, cropH, 0, 0, finalW, finalH);

      const dataUrl = c.toDataURL('image/png');
      const p = document.getElementById('bancoPreview');
      p.src = dataUrl;
      p.style.display = 'block';
    };
    original.src = e.target.result;
  };
  r.readAsDataURL(f);
});

document.getElementById('btnAddBanco').addEventListener('click',async function(){
  const nombre=document.getElementById('bancoNombreInput').value.trim();
  const preview=document.getElementById('bancoPreview');
  if(!nombre){alert('Escribe el nombre del banco.');return;}
  if(!preview.src||preview.style.display==='none'){alert('Selecciona un logo.');return;}
  const key=nombre.toLowerCase().replace(/\s+/g,'');
  if(bancosCustom.find(b=>b.key===key)){alert('Ya existe un banco con ese nombre.');return;}
  this.disabled=true;
  this.textContent='⏳ Subiendo a Drive...';
  // Agregar temporalmente con base64 para que guardarLogos lo suba a Drive
  bancosCustom.push({nombre,key,logo:preview.src});
  renderBancosChips();
  await guardarLogos(); // GAS sube a Drive y devuelve URL pública → bancosCustom se actualiza
  renderBancosChips(); // Re-renderizar con la URL de Drive ya actualizada
  renderInfografia();
  document.getElementById('bancoNombreInput').value='';
  document.getElementById('bancoLogoInput').value='';
  preview.src='';preview.style.display='none';
  this.disabled=false;this.textContent='+ Agregar';
});

function renderBancosChips(){
  const c=document.getElementById('bancosChips');
  c.innerHTML=bancosCustom.map((b,i)=>`
    <div class="banco-chip">
      <img src="${b.logo}" alt="${escHtml(b.nombre)}">
      <span>${escHtml(b.nombre)}</span>
      <button class="chip-del" data-i="${i}" data-key="${escHtml(b.key)}">✕</button>
    </div>`).join('');
  c.querySelectorAll('.chip-del').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const key = btn.dataset.key;
      bancosCustom.splice(+btn.dataset.i,1);
      renderBancosChips(); renderInfografia();
      // Eliminar de Drive + hoja en el servidor
      const r = await gasCall({action:'eliminarLogoBanco', key:key});
      if(r && r.ok && r.bancos){ bancosCustom = r.bancos; }
    });
  });
}

/* ── Agregar cuenta / grupo (agregado el ramal de "info") ── */
document.getElementById('btnAddCuenta').addEventListener('click',()=>{
  if(empresaActual === 'info'){
    empresasState.info.grupos.push({
      marcas:[], razonSocial:'', ruc:'', domicilioFiscal:'',
      representanteLegal:'', dniRepresentante:''
    });
    guardarEstadoGlobal(true);
    renderEditor();renderInfografia();
    return;
  }
  const nuevaCuenta = {banco:'',numero:'',cci:'',titular:'',observacion:'',activo:true};
  if(empresaActual === 'egida'){
    nuevaCuenta.titulo = '';
    nuevaCuenta.columna = 1;
  }
  empresasState[empresaActual].cuentas.push(nuevaCuenta);
  guardarEstadoGlobal(true);
  renderEditor();renderInfografia();
});

/* ── Descarga + guarda en Drive y Sheets ── */
document.getElementById('btnDescargar').addEventListener('click',async function(){
  const btn = this;
  btn.disabled=true; btn.textContent='⏳ Generando imagen...';
  const target=document.getElementById('infografiaPreview').firstElementChild;
  if(!target){ btn.disabled=false; btn.textContent='⬇ Descargar PNG'; return; }

  html2canvas(target,{scale:2.5,backgroundColor:null,useCORS:true,allowTaint:true}).then(async canvas=>{
    const dataUrl  = canvas.toDataURL('image/png');
    const nombre   = 'pago-' + empresaActual + '-' + new Date().toISOString().slice(0,10) + '.png';

    // 1. Descarga local inmediata
    const link = document.createElement('a');
    link.download = nombre;
    link.href = dataUrl;
    link.click();

    // 2. Guardar en Drive + Sheets en segundo plano
    btn.textContent='⏳ Guardando en Drive...';
    try {
      const base64 = dataUrl.split(',')[1];
      const res    = await gasCall({
        action:   'guardarPlantilla',
        nombre:   nombre,
        base64:   base64,
        mimeType: 'image/png'
      });
      if(res && res.ok){
        btn.textContent='✅ Guardado en Drive';
        setTimeout(()=>{ btn.textContent='⬇ Descargar PNG'; btn.disabled=false; }, 2500);
      } else {
        console.warn('No se pudo guardar en Drive:', res?.error);
        btn.textContent='⬇ Descargar PNG';
        btn.disabled=false;
      }
    } catch(e){
      console.warn('Error guardando en Drive:', e);
      btn.textContent='⬇ Descargar PNG';
      btn.disabled=false;
    }
  });
});

/* ── Inicio ── */
(async function init(){
  setEmpresaTab();
  renderBancosChips();
  renderEditor();
  renderInfografia();

  // 1. Cargar estado de empresas y logos desde el servidor
  try {
    await cargarEstadoGlobal();
    await cargarLogos();
    renderEditor();
    renderBancosChips();
    renderInfografia();
  } catch(e) {
    console.warn('Error al cargar desde servidor:', e);
  }

  // 2. Iniciar sincronización automática cada 15 segundos
  setInterval(sincronizarConServidor, 15000);
})();
</script>
